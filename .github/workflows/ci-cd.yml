name: Fullstack CI/CD (Latest)

on:
  push:
    branches: [main, Dev]
  pull_request:

env:
  NODE_VERSION: 20

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Backend
        working-directory: ./services
        run: npm ci

      - name: Test Backend
        working-directory: ./services
        run: npm run test:ci

      - name: Install Frontend
        working-directory: ./app
        run: npm ci

      - name: Build Frontend
        working-directory: ./app
        run: npm run build

      - name: Build Backend Image
        run: docker build -t shopee-backend ./services

      - name: Build Frontend Image
        run: docker build -t shopee-frontend ./app

  cd:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/shopee-backend:latest ./services
          docker push ${{ secrets.DOCKER_USERNAME }}/shopee-backend:latest

      - name: Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/shopee-frontend:latest ./app
          docker push ${{ secrets.DOCKER_USERNAME }}/shopee-frontend:latest